<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Route Optimization · Smart Logistics Hub</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo">SL</div>
        <div>
          <div class="sidebar-title">Smart Logistics Hub</div>
          <div class="sidebar-sub">Delivery Operations</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a class="sidebar-link" href="dashboard.html">Delivery Dashboard</a>
        <a class="sidebar-link" href="map.html">Live Delivery Map</a>
        <a class="sidebar-link active" href="optimization.html">Route Optimization</a>
        <a class="sidebar-link" href="history.html">Delivery History</a>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn" class="btn btn-secondary" style="width:100%; border-color: rgba(255,255,255,0.1);">Logout</button>
      </div>
    </aside>
    
    <main class="main-content">
      <header class="main-header">
        <h1>Route Optimization Engine</h1>
        <p>Shortest-path logic and CO₂ emission analytics for optimized dispatch</p>
      </header>

      <section class="content-section">
        <div class="panel-grid">
          <div class="panel">
            <div class="panel-title">Optimized Trajectories</div>
            <div id="lgRoutesPanel" class="logs" style="max-height: 400px;">
              <!-- Routes loaded via script -->
            </div>
          </div>
          <div class="panel">
            <div class="panel-title">Sustainability Metrics</div>
            <div style="padding:20px; text-align:center;">
              <div style="font-size:48px; color:var(--success);">12.4%</div>
              <div style="font-size:14px; color:var(--muted); margin-top:8px;">CO₂ Reduction via Pathfinding</div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="../script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
        initApp();
        pollSimulationStream(); // Get latest route data
    });
  </script>
</body>
</html>
