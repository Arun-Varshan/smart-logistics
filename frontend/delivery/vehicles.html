<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>List of Vehicles · Smart Logistics Hub</title>
  <link rel="stylesheet" href="../styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* Table layout */
    .table-row, .table-head {
      display: grid !important;
      grid-template-columns: 120px 140px 140px 140px 1fr 120px !important;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
    }
    .table-body .table-row {
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .table-body .table-row:hover {
      background: rgba(255,255,255,0.02);
    }
    .btn-remove {
      padding: 6px 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    .btn-remove:hover {
      background: rgba(239, 68, 68, 0.2);
    }
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      z-index: 1000;
      place-items: center;
    }
    .modal-overlay.open {
      display: grid;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo">SL</div>
        <div>
          <div class="sidebar-title">Smart Logistics Hub</div>
          <div class="sidebar-sub">Delivery Operations</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a class="sidebar-link" href="dashboard.html">Delivery Dashboard</a>
        <a class="sidebar-link active" href="vehicles.html">List of Vehicles</a>
        <a class="sidebar-link" href="map.html">Live Delivery Map</a>
        <a class="sidebar-link" href="optimization.html">Route Optimization</a>
        <a class="sidebar-link" href="history.html">Delivery History</a>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn" class="btn btn-secondary" style="width:100%; border-color: rgba(255,255,255,0.1);">Logout</button>
      </div>
    </aside>
    
    <main class="main-content">
      <header class="main-header">
        <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
          <div>
            <h1>Vehicle Fleet Management</h1>
            <p>Manage delivery vehicles and drivers</p>
          </div>
          <button class="btn btn-primary" onclick="openAddVehicleModal()">Add Vehicle</button>
        </div>
      </header>

      <section class="content-section">
        <div class="panel">
          <div class="panel-title">Active Fleet</div>
          <div class="table">
            <div class="table-row table-head">
              <div>Vehicle ID</div><div>Number</div><div>Driver</div><div>Type</div><div>Status</div><div>Actions</div>
            </div>
            <div id="vehicleListBody" class="table-body">
              <div style="padding:20px; text-align:center; color:var(--muted);">Loading vehicles...</div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Add Vehicle Modal -->
  <div id="addVehicleModal" class="modal-overlay">
    <div class="panel modal-content" style="width:400px; padding:24px; position:relative;">
      <button class="btn-close" onclick="closeAddVehicleModal()" style="position:absolute; top:16px; right:16px; background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer;">&times;</button>
      <h2 style="margin-bottom:20px;">Add New Vehicle</h2>
      <div style="display:grid; gap:16px;">
        <div>
          <label style="display:block; font-size:12px; color:var(--muted); margin-bottom:4px;">Vehicle Number</label>
          <input type="text" id="newVehicleNum" class="form-input" placeholder="DL01">
        </div>
        <div>
          <label style="display:block; font-size:12px; color:var(--muted); margin-bottom:4px;">Driver Name</label>
          <input type="text" id="newDriverName" class="form-input" placeholder="Driver Name">
        </div>
      </div>
      <div style="display:flex; gap:12px; margin-top:24px;">
        <button class="btn btn-primary" style="flex:1" onclick="submitNewVehicle()">Add Vehicle</button>
      </div>
    </div>
  </div>

  <script src="../script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
        initApp();
        fetchVehicles();
    });

    async function fetchVehicles() {
        try {
            const res = await apiFetch("/api/transport/vehicles");
            const vehicles = await res.json();
            const body = document.getElementById("vehicleListBody");
            
            if (!vehicles || vehicles.length === 0) {
                body.innerHTML = `<div style="padding:40px; text-align:center; color:var(--muted);">No vehicles found.</div>`;
                return;
            }

            body.innerHTML = vehicles.map(v => `
                <div class="table-row">
                    <div style="font-weight:700; color:var(--primary);">${v.vehicle_id}</div>
                    <div>${v.vehicle_number}</div>
                    <div>${v.driver_name}</div>
                    <div>${v.vehicle_type || 'Truck'}</div>
                    <div>
                        <span class="badge ${v.current_status === 'IDLE' ? 'received-at-hub' : (v.current_status === 'OUT_FOR_DELIVERY' ? 'out-for-delivery' : 'delayed')}">
                            ${v.current_status}
                        </span>
                    </div>
                    <div>
                        <button class="btn-remove" onclick="removeVehicle('${v.vehicle_id}')">Remove</button>
                    </div>
                </div>
            `).join("");
        } catch (e) {
            console.error(e);
        }
    }

    function openAddVehicleModal() {
        document.getElementById('addVehicleModal').classList.add('open');
    }

    function closeAddVehicleModal() {
        document.getElementById('addVehicleModal').classList.remove('open');
    }

    async function submitNewVehicle() {
        const num = document.getElementById('newVehicleNum').value;
        const driver = document.getElementById('newDriverName').value;
        
        if (!num) return alert("Vehicle Number is required");

        const res = await apiFetch("/api/transport/add_vehicle", {
            method: "POST",
            body: JSON.stringify({ vehicle_number: num, driver_name: driver })
        });

        if (res.ok) {
            closeAddVehicleModal();
            fetchVehicles();
        } else {
            alert("Failed to add vehicle");
        }
    }

    async function removeVehicle(id) {
        if (!confirm("Are you sure you want to remove this vehicle?")) return;
        
        const res = await apiFetch("/api/transport/remove_vehicle", {
            method: "POST",
            body: JSON.stringify({ vehicle_id: id })
        });

        if (res.ok) {
            fetchVehicles();
        } else {
            alert("Failed to remove vehicle");
        }
    }
  </script>
</body>
</html>
